<script>
(function(){
var grid=document.getElementById('clsGrid');
var ads=[];

// Load from JSON
fetch('data/classifieds.json')
  .then(function(r){return r.json();})
  .then(function(data){
    ads=data.classifieds.map(function(c){
      return {id:c.id,type:c.type,title:c.title,desc:c.description,bhk:c.bhk,area:c.area,size:c.size,price:c.price,ppsf:c.pricePerSqft,floor:c.floor,facing:c.facing,furnished:c.furnished,parking:c.parking,possession:c.possession,status:c.status,posted:c.postedDate,featured:c.featured,img:c.image,link:c.projectLink||"",wa:c.whatsapp};
    });
    render(ads);
  })
  .catch(function(e){console.error('JSON load failed',e);});


function getBadge(ad){
  if(ad.featured)return '<span class="cls-badge cls-badge-featured">FEATURED</span>';
  if(ad.status==='Ready to Move')return '<span class="cls-badge cls-badge-rtm">READY TO MOVE</span>';
  if(ad.status==='Pre Launch')return '<span class="cls-badge cls-badge-prelaunch">PRE LAUNCH</span>';
  if(ad.status==='New Launch')return '<span class="cls-badge cls-badge-prelaunch">NEW LAUNCH</span>';
  return '<span class="cls-badge cls-badge-uc">UNDER CONSTRUCTION</span>';
}

function render(list){
  if(!list.length){grid.innerHTML='<div class="cls-empty">No listings match your filters.</div>';return;}
  grid.innerHTML=list.map(function(ad){
    return '<div class="cls-card">'+
      '<div class="cls-card-img" style="background-image:url(\''+ad.img+'\')">'+getBadge(ad)+'</div>'+
      '<div class="cls-card-body">'+
      '<div class="cls-card-title">'+ad.title+'</div>'+
      '<div class="cls-card-loc">\ud83d\udccd '+ad.area+', Hyderabad \u2022 Posted '+ad.posted+'</div>'+
      '<div class="cls-card-specs">'+
      '<span class="cls-spec">'+ad.bhk+'</span>'+
      '<span class="cls-spec">'+ad.size+'</span>'+
      '<span class="cls-spec">'+ad.floor+'</span>'+
      '<span class="cls-spec">'+ad.facing+'</span>'+
      '<span class="cls-spec">'+ad.parking+'</span>'+
      (ad.possession!=='TBA'?'<span class="cls-spec">Possession: '+ad.possession+'</span>':'')+
      '</div>'+
      '<div class="cls-card-price">'+ad.price+'</div>'+
      '<div class="cls-card-ppsf">'+ad.ppsf+'</div>'+
      '<div class="cls-card-desc">'+ad.desc+'</div>'+
      '<div class="cls-card-actions">'+
      '<a href="'+ad.link+'" class="cls-btn cls-btn-outline">View Project</a>'+
      '<a href="'+ad.wa+'" class="cls-btn cls-btn-wa" target="_blank" rel="noopener">WhatsApp</a>'+
      '<a href="tel:+919391954743" class="cls-btn cls-btn-primary">Call Now</a>'+
      '</div></div></div>';
  }).join('');
}

function filter(){
  var area=document.getElementById('clsArea').value;
  var bhk=document.getElementById('clsBhk').value;
  var status=document.getElementById('clsStatus').value;
  var f=ads.filter(function(a){
    if(area&&a.area!==area)return false;
    if(bhk&&a.bhk!==bhk)return false;
    if(status&&a.status!==status)return false;
    return true;
  });
  render(f);
}

document.getElementById('clsArea').addEventListener('change',filter);
document.getElementById('clsBhk').addEventListener('change',filter);
document.getElementById('clsStatus').addEventListener('change',filter);
render(ads);
})();
</script>
